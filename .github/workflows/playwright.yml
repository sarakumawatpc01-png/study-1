name: Playwright Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke and integration checks
        run: npm test
        env:
          JWT_SECRET: ci-jwt-secret
          AUDIT_SIGNING_SECRET: ci-audit-secret
          PAYMENT_CONFIG_ENCRYPTION_KEY: ci-payment-secret
          ADMIN_REQUIRE_MFA: "false"

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          JWT_SECRET: ci-jwt-secret
          AUDIT_SIGNING_SECRET: ci-audit-secret
          PAYMENT_CONFIG_ENCRYPTION_KEY: ci-payment-secret
          ADMIN_REQUIRE_MFA: "false"

      - name: Upload Playwright report and traces/videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 14

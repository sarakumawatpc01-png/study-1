services:
  study:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_ROOT_DIR=/app
      - TRUST_PROXY=true
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - study_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  study_data:

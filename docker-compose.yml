services:
  study:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_ROOT_DIR=/app
      - TRUST_PROXY=1
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - study_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:3000/health',(res)=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  study_data:
